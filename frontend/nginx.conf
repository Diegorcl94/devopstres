server {    listen 80;    root /usr/share/nginx/html;    index index.html;    location /api/products {        proxy_pass http://127.0.0.1:3001/api/products;        proxy_http_version 1.1;        proxy_set_header Host $host;        proxy_set_header X-Real-IP $remote_addr;    }    location /api/orders {        proxy_pass http://127.0.0.1:3002/api/orders;        proxy_http_version 1.1;        proxy_set_header Host $host;        proxy_set_header X-Real-IP $remote_addr;    }    location / {        try_files $uri /index.html;    }}
